name: Build Binaries

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

env:
  GO_VERSION: "1.24.1"
  APP_NAME: ai-dev-team

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: 386
            ext: ""

          # Windows
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: 386
            ext: ".exe"

          # macOS
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Show Go version
        run: go version

      - name: Prepare output folder
        run: mkdir -p dist

      - name: Build binaries
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          set -euo pipefail

          TARGET="${GOOS}-${GOARCH}"
          OUTDIR="dist/${TARGET}"
          mkdir -p "${OUTDIR}"

          SERVER_NAME="agent-server${{ matrix.ext }}"
          CLI_NAME="agentctl${{ matrix.ext }}"

          go build -trimpath -ldflags="-s -w" -o "${OUTDIR}/${SERVER_NAME}" ./cmd/agent-server
          go build -trimpath -ldflags="-s -w" -o "${OUTDIR}/${CLI_NAME}" ./cmd/agentctl

          cp README.md "${OUTDIR}/" || true

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail

          TARGET="${{ matrix.goos }}-${{ matrix.goarch }}"
          OUTDIR="dist/${TARGET}"
          ARTIFACT_BASENAME="${APP_NAME}_${TARGET}"

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            cd dist
            zip -r "${ARTIFACT_BASENAME}.zip" "${TARGET}"
          else
            tar -C dist -czf "dist/${ARTIFACT_BASENAME}.tar.gz" "${TARGET}"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_${{ matrix.goos }}_${{ matrix.goarch }}
          path: |
            dist/${{ env.APP_NAME }}_${{ matrix.goos }}-${{ matrix.goarch }}.zip
            dist/${{ env.APP_NAME }}_${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
          if-no-files-found: error
          retention-days: 30

  release-assets:
    name: Upload release assets
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-dist

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upload
          find release-dist -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} upload/ \;
          ls -la upload

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*